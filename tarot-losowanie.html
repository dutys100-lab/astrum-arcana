<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astrum & Arcana — Losowanie Kart Tarota</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#faf6ef;--parchment:#f2ead8;--gold:#b8902a;--gold-l:#d4aa4a;
  --gold-border:rgba(184,144,42,0.22);--ink:#2a2018;--ink-mid:#5a4a32;
  --ink-soft:#8a7a62;--mystic:#6b4fa0;--mystic-l:#9b7fc8;--mystic-pale:#f0ebfa;
  --rose:#9b4060;--surface:#fff;--surface2:#fdf9f2;
  --card-w:70px;--card-h:115px;
}
body{font-family:'EB Garamond',serif;background:var(--cream);color:var(--ink);min-height:100vh;font-size:17px;line-height:1.7;}

/* HEADER */
.header{text-align:center;padding:2.5rem 1rem 1.5rem;border-bottom:1px solid var(--gold-border);}
.header .sym{font-size:1.4rem;color:var(--gold-l);letter-spacing:0.4em;display:block;margin-bottom:0.4rem;}
.header h1{font-family:'Cinzel',serif;font-size:1.6rem;font-weight:400;letter-spacing:0.12em;color:var(--ink);}
.header p{font-size:0.75rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--ink-soft);margin-top:4px;font-family:'Cinzel',serif;}

/* CONTROLS */
.controls{max-width:800px;margin:1.8rem auto;padding:0 1.5rem;display:flex;flex-wrap:wrap;gap:1rem;align-items:flex-end;}
.ctrl-group{display:flex;flex-direction:column;gap:0.3rem;flex:1;min-width:180px;}
.ctrl-group label{font-size:0.68rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-soft);font-family:'Cinzel',serif;}
.ctrl-group select, .ctrl-group input{background:var(--surface);border:1px solid var(--gold-border);border-radius:4px;color:var(--ink);font-family:'EB Garamond',serif;font-size:1rem;padding:0.45rem 0.7rem;outline:none;width:100%;}
.ctrl-group select:focus, .ctrl-group input:focus{border-color:var(--gold);}

.btn-main{font-family:'Cinzel',serif;font-size:0.8rem;letter-spacing:0.12em;color:#fff;background:var(--gold);border:none;border-radius:4px;padding:0.65rem 1.8rem;cursor:pointer;transition:background 0.2s;white-space:nowrap;}
.btn-main:hover{background:var(--gold-l);}
.btn-main:disabled{opacity:0.45;cursor:not-allowed;}
.btn-secondary{font-family:'Cinzel',serif;font-size:0.75rem;letter-spacing:0.1em;color:var(--ink-soft);background:transparent;border:1px solid var(--gold-border);border-radius:4px;padding:0.6rem 1.2rem;cursor:pointer;transition:all 0.2s;}
.btn-secondary:hover{border-color:var(--gold);color:var(--ink);}

/* INFO BAR */
.info-bar{max-width:800px;margin:0 auto 1rem;padding:0 1.5rem;}
.spread-info{background:var(--mystic-pale);border:1px solid rgba(107,79,160,0.15);border-radius:6px;padding:0.6rem 0.9rem;font-size:0.87rem;color:var(--mystic);line-height:1.5;}
.spread-info strong{font-family:'Cinzel',serif;font-size:0.7rem;letter-spacing:0.1em;}
.counter-bar{display:flex;justify-content:space-between;align-items:center;margin-top:0.7rem;}
.counter-bar span{font-size:0.82rem;color:var(--ink-soft);}
.counter-bar em{color:var(--gold);font-style:normal;font-weight:500;}

/* DECK AREA */
.deck-area{max-width:900px;margin:0 auto 1.5rem;padding:0 1rem;}
.deck-title{font-family:'Cinzel',serif;font-size:0.72rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:0.7rem;text-align:center;}

/* CARD GRID — fanned deck */
.deck-grid{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:1rem;background:var(--surface);border:1px solid var(--gold-border);border-radius:8px;min-height:160px;}

/* Single card */
.card{width:var(--card-w);height:var(--card-h);perspective:600px;cursor:pointer;flex-shrink:0;}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.55s cubic-bezier(0.4,0,0.2,1);}
.card.flipped .card-inner{transform:rotateY(180deg);}
.card.used{opacity:0.35;pointer-events:none;}

.card-back,.card-front{
  position:absolute;inset:0;border-radius:6px;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  display:flex;align-items:center;justify-content:center;
  border:1.5px solid var(--gold-border);
  box-shadow:0 2px 8px rgba(0,0,0,0.12);
}
.card-back{
  background:linear-gradient(135deg,#1a0e2e 0%,#2d1a5c 50%,#1a0e2e 100%);
  flex-direction:column;gap:4px;
}
.card-back::before{
  content:'';position:absolute;inset:6px;border:1px solid rgba(212,170,74,0.3);border-radius:4px;
}
.card-back .sym{font-size:1.4rem;color:rgba(212,170,74,0.8);}
.card-back .dots{font-size:0.5rem;color:rgba(212,170,74,0.4);letter-spacing:2px;}

.card-front{
  background:var(--surface);flex-direction:column;gap:4px;padding:6px;
  transform:rotateY(180deg);text-align:center;
}
.card-front .card-name{font-family:'Cinzel',serif;font-size:0.52rem;letter-spacing:0.05em;color:var(--ink);line-height:1.3;}
.card-front .card-suit{font-size:0.65rem;color:var(--gold);}
.card-front .card-num{font-size:0.85rem;color:var(--mystic);}
.card-front.reversed .card-name{color:var(--rose);}
.card-front.reversed{border-color:rgba(155,64,96,0.3);}
.card-front .rev-label{font-size:0.42rem;color:var(--rose);font-family:'Cinzel',serif;letter-spacing:0.05em;}

.card:hover:not(.used):not(.flipped) .card-back{box-shadow:0 4px 16px rgba(107,79,160,0.35);border-color:var(--mystic-l);}

/* SELECTED CARDS DISPLAY */
.selected-area{max-width:800px;margin:0 auto 1.5rem;padding:0 1.5rem;}
.selected-title{font-family:'Cinzel',serif;font-size:0.72rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:0.6rem;}
.selected-cards{display:flex;flex-wrap:wrap;gap:10px;}
.sel-card{background:var(--surface);border:1px solid var(--gold-border);border-radius:6px;padding:0.5rem 0.75rem;display:flex;align-items:center;gap:8px;font-size:0.85rem;}
.sel-card .pos{font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.1em;color:var(--ink-soft);white-space:nowrap;}
.sel-card .cname{color:var(--ink);}
.sel-card .cname.rev{color:var(--rose);}
.sel-card .rev-tag{font-size:0.65rem;color:var(--rose);font-family:'Cinzel',serif;}

/* QUESTION */
.question-area{max-width:800px;margin:0 auto 1.5rem;padding:0 1.5rem;}
.question-area label{font-size:0.68rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-soft);font-family:'Cinzel',serif;display:block;margin-bottom:0.3rem;}
.question-area input{width:100%;background:var(--surface);border:1px solid var(--gold-border);border-radius:4px;color:var(--ink);font-family:'EB Garamond',serif;font-size:1rem;padding:0.5rem 0.75rem;outline:none;}
.question-area input:focus{border-color:var(--gold);}

/* ACTION BUTTONS */
.action-area{max-width:800px;margin:0 auto 1.5rem;padding:0 1.5rem;display:flex;gap:10px;flex-wrap:wrap;}

/* RESULT */
.result-area{max-width:800px;margin:0 auto 2rem;padding:0 1.5rem;}
.result-box{background:var(--surface2);border:1px solid var(--gold-border);border-left:3px solid var(--gold);border-radius:4px;padding:1.4rem 1.6rem;font-size:1rem;line-height:1.9;white-space:pre-wrap;color:var(--ink);display:none;}
.result-box.visible{display:block;}
.result-box.loading{color:var(--ink-soft);font-style:italic;}
.pdf-row{margin-top:0.9rem;display:none;}
.btn-pdf{font-family:'Cinzel',serif;font-size:0.75rem;letter-spacing:0.1em;color:var(--gold);background:transparent;border:1px solid var(--gold-border);border-radius:4px;padding:0.55rem 1.1rem;cursor:pointer;transition:all 0.2s;}
.btn-pdf:hover{background:var(--parchment);border-color:var(--gold);}

/* REV TOGGLE */
.rev-row{max-width:800px;margin:0 auto 0.8rem;padding:0 1.5rem;display:flex;align-items:center;gap:0.6rem;font-size:0.85rem;color:var(--ink-soft);}
.rev-row input{width:auto;cursor:pointer;accent-color:var(--mystic);}

/* FOOTER */
footer{text-align:center;padding:2rem 1rem;font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.1em;color:var(--ink-soft);border-top:1px solid var(--gold-border);}

@media(max-width:600px){
  :root{--card-w:55px;--card-h:90px;}
  .controls{flex-direction:column;}
  .header h1{font-size:1.2rem;}
}
</style>
</head>
<body>

<div class="header">
  <span class="sym">&#9789; &#10022; &#9791;</span>
  <h1>Astrum &amp; Arcana</h1>
  <p>Losowanie Kart Tarota</p>
</div>

<div class="controls">
  <div class="ctrl-group">
    <label>Uk&#322;ad kart</label>
    <select id="spread-select" onchange="onSpreadChange()">
      <option value="1">1 karta &#8212; Przekaz dnia</option>
      <option value="3-past">3 karty &#8212; Przesz&#322;o&#347;&#263; / Tera&#378;niejszo&#347;&#263; / Przysz&#322;o&#347;&#263;</option>
      <option value="3-mind">3 karty &#8212; Umys&#322; / Cia&#322;o / Duch</option>
      <option value="3-sit">3 karty &#8212; Sytuacja / Dzia&#322;anie / Wynik</option>
      <option value="celtic">Celtycki Krzy&#380; (10 kart)</option>
      <option value="horseshoe">Podkowa (7 kart)</option>
      <option value="star">Gwiazda (6 kart)</option>
      <option value="relationship">Relacja (6 kart)</option>
      <option value="decision">Rozstaj dr&#243;g (5 kart)</option>

    </select>
  </div>
  <div class="ctrl-group" style="max-width:160px;">
    <label>Imi&#281; (opcjonalnie)</label>
    <input type="text" id="user-name" placeholder="Twoje imi&#281;...">
  </div>

</div>

<div class="info-bar">
  <div class="spread-info">
    <strong id="spread-name">Przekaz dnia</strong>
    <span id="spread-desc"> &#8212; Jedna karta, bezpo&#347;redni przekaz.</span>
    <div class="counter-bar">
      <span>Odwr&#243;cono: <em id="flipped-count">0</em> / <em id="need-count">1</em></span>
      <span id="status-msg" style="font-style:italic;color:var(--mystic);">Kliknij kart&#281; aby j&#261; odkry&#263;</span>
    </div>
  </div>
</div>



<div class="deck-area">
  <div class="deck-title">&#9789; Talia kart &#9789;</div>
  <div class="deck-grid" id="deck-grid"></div>
</div>

<div class="selected-area" id="selected-area" style="display:none;">
  <div class="selected-title">&#10022; Twoje karty</div>
  <div class="selected-cards" id="selected-cards"></div>
</div>

<div class="question-area">
  <label>Twoje pytanie lub intencja (opcjonalnie)</label>
  <input type="text" id="question" placeholder="O czym chcesz si&#281; dowiedzie&#263;?">
</div>

<div class="action-area">
  <button class="btn-main" id="interpret-btn" onclick="interpretCards()" disabled>&#9789; Interpretuj uk&#322;ad</button>
  <button class="btn-secondary" onclick="startNewReading()">&#8635; Zacznij od nowa</button>
</div>

<div class="result-area">
  <div class="result-box" id="result-box"></div>
  <div class="pdf-row" id="pdf-row">
    <button class="btn-pdf" onclick="downloadPDF()">&#8659; Pobierz PDF</button>
  </div>
</div>

<footer>Astrum &amp; Arcana &nbsp;&middot;&nbsp; Losowanie Kart Tarota</footer>

<script>
var WORKER_URL='https://astrum-proxy.dutys100.workers.dev';

var ALL_CARDS=[
  "0 G\u0142upiec","I Mag","II Najwy\u017csza Kap\u0142anka","III Cesarzowa","IV Cesarz",
  "V Papie\u017c","VI Kochankowie","VII Rydwan","VIII Si\u0142a","IX Pustelnik",
  "X Ko\u0142o Fortuny","XI Sprawiedliwo\u015b\u0107","XII Wieszak","XIII \u015amier\u0107",
  "XIV Umiarkowanie","XV Diabe\u0142","XVI Wie\u017ca","XVII Gwiazda","XVIII Ksi\u0119\u017cyc",
  "XIX S\u0142o\u0144ce","XX S\u0105d Ostateczny","XXI \u015awiat",
  "As Mieczy","2 Mieczy","3 Mieczy","4 Mieczy","5 Mieczy","6 Mieczy","7 Mieczy",
  "8 Mieczy","9 Mieczy","10 Mieczy","Pa\u017c Mieczy","Rycerz Mieczy","Kr\u00f3lowa Mieczy","Kr\u00f3l Mieczy",
  "As Puchar\u00f3w","2 Puchar\u00f3w","3 Puchar\u00f3w","4 Puchar\u00f3w","5 Puchar\u00f3w","6 Puchar\u00f3w",
  "7 Puchar\u00f3w","8 Puchar\u00f3w","9 Puchar\u00f3w","10 Puchar\u00f3w","Pa\u017c Puchar\u00f3w",
  "Rycerz Puchar\u00f3w","Kr\u00f3lowa Puchar\u00f3w","Kr\u00f3l Puchar\u00f3w",
  "As R\u00f3\u017cd\u017cek","2 R\u00f3\u017cd\u017cek","3 R\u00f3\u017cd\u017cek","4 R\u00f3\u017cd\u017cek","5 R\u00f3\u017cd\u017cek",
  "6 R\u00f3\u017cd\u017cek","7 R\u00f3\u017cd\u017cek","8 R\u00f3\u017cd\u017cek","9 R\u00f3\u017cd\u017cek","10 R\u00f3\u017cd\u017cek",
  "Pa\u017c R\u00f3\u017cd\u017cek","Rycerz R\u00f3\u017cd\u017cek","Kr\u00f3lowa R\u00f3\u017cd\u017cek","Kr\u00f3l R\u00f3\u017cd\u017cek",
  "As Pentakli","2 Pentakli","3 Pentakli","4 Pentakli","5 Pentakli","6 Pentakli",
  "7 Pentakli","8 Pentakli","9 Pentakli","10 Pentakli","Pa\u017c Pentakli",
  "Rycerz Pentakli","Kr\u00f3lowa Pentakli","Kr\u00f3l Pentakli"
];

var SPREADS={
  "1":{count:1,name:"Przekaz dnia",positions:["Przekaz / Odpowied\u017a"],desc:"Jedna karta, bezpo\u015bredni przekaz."},
  "3-past":{count:3,name:"Przesz\u0142o\u015b\u0107 / Tera\u017aniejszo\u015b\u0107 / Przysz\u0142o\u015b\u0107",positions:["Przesz\u0142o\u015b\u0107","Tera\u017aniejszo\u015b\u0107","Przysz\u0142o\u015b\u0107"],desc:"Klasyczny uk\u0142ad trzech kart."},
  "3-mind":{count:3,name:"Umys\u0142 / Cia\u0142o / Duch",positions:["Umys\u0142","Cia\u0142o","Duch"],desc:"Trzy wymiary istnienia."},
  "3-sit":{count:3,name:"Sytuacja / Dzia\u0142anie / Wynik",positions:["Sytuacja","Dzia\u0142anie","Wynik"],desc:"Praktyczny uk\u0142ad."},
  "celtic":{count:10,name:"Celtycki Krzy\u017c",positions:["Serce sprawy","Przeszkoda","Pod\u0142o\u017ce","Odleg\u0142a przesz\u0142o\u015b\u0107","Mo\u017cliwy wynik","Bliska przysz\u0142o\u015b\u0107","Twoja postawa","Wp\u0142yw zewn\u0119trzny","Nadzieje i l\u0119ki","Ostateczny wynik"],desc:"Celtycki Krzy\u017c \u2014 10 pozycji."},
  "horseshoe":{count:7,name:"Podkowa",positions:["Przesz\u0142o\u015b\u0107","Tera\u017aniejszo\u015b\u0107","Ukryte wp\u0142ywy","Przeszkody","Otoczenie","Rada","Wynik"],desc:"Podkowa \u2014 7 kart."},
  "star":{count:6,name:"Gwiazda",positions:["Tera\u017aniejszo\u015b\u0107","Nadzieje","L\u0119ki","Fundament","Co blokuje","Kierunek"],desc:"Gwiazda \u2014 6 kart."},
  "relationship":{count:6,name:"Relacja",positions:["Ty","Druga osoba","Po\u0142\u0105czenie","Przesz\u0142o\u015b\u0107","Wyzwanie","Potencja\u0142"],desc:"Uk\u0142ad na relacj\u0119."},
  "decision":{count:5,name:"Rozstaj dr\u00f3g",positions:["Serce pytania","Opcja A","Opcja B","Co stracisz","Co zyskasz"],desc:"Rozstaj dr\u00f3g \u2014 5 kart."},
  "year":{count:12,name:"Uk\u0142ad Roczny",positions:["Stycze\u0144","Luty","Marzec","Kwiecie\u0144","Maj","Czerwiec","Lipiec","Sierpie\u0144","Wrzesie\u0144","Pa\u017adziernik","Listopad","Grudzie\u0144"],desc:"Uk\u0142ad roczny \u2014 12 kart."}
};

var currentSpread="1";
var shuffledDeck=[];
var flippedCards=[];  // [{index, name, reversed, position}]
var cardElements=[];
var savedResult="";
var savedMeta={};

function shuffle(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
  return a;
}

function onSpreadChange(){
  currentSpread=document.getElementById('spread-select').value;
  var s=SPREADS[currentSpread];
  document.getElementById('spread-name').textContent=s.name;
  document.getElementById('spread-desc').textContent=' \u2014 '+s.desc;
  document.getElementById('need-count').textContent=s.count;
  startNewReading();
}

function startNewReading(){
  shuffledDeck=shuffle(ALL_CARDS);
  flippedCards=[];
  savedResult='';
  document.getElementById('flipped-count').textContent='0';
  document.getElementById('status-msg').textContent='Kliknij kart\u0119 aby j\u0105 odkry\u0107';
  document.getElementById('interpret-btn').disabled=true;
  document.getElementById('selected-area').style.display='none';
  document.getElementById('selected-cards').innerHTML='';
  document.getElementById('result-box').className='result-box';
  document.getElementById('result-box').textContent='';
  document.getElementById('pdf-row').style.display='none';
  document.getElementById('question').value='';
  renderDeck();
}

function renderDeck(){
  var grid=document.getElementById('deck-grid');
  grid.innerHTML='';
  cardElements=[];
  var s=SPREADS[currentSpread];

  shuffledDeck.forEach(function(name,i){
    var card=document.createElement('div');
    card.className='card';
    card.dataset.index=i;
    card.dataset.name=name;

    var inner=document.createElement('div');
    inner.className='card-inner';

    var back=document.createElement('div');
    back.className='card-back';
    back.innerHTML='<span class="sym">&#10022;</span><span class="dots">&#183; &#183; &#183;</span>';

    var front=document.createElement('div');
    front.className='card-front';

    inner.appendChild(back);
    inner.appendChild(front);
    card.appendChild(inner);

    card.onclick=function(){onCardClick(card,i,name,front,s);};
    grid.appendChild(card);
    cardElements.push(card);
  });
}

function onCardClick(card,i,name,front,s){
  var needed=s.count;

  var existing=flippedCards.find(function(c){return c.index===i;});
  if(existing)return;

  if(flippedCards.length>=needed)return;

  // Automatyczne losowanie odwrocenia - 30% szans
  var isReversed=Math.random()<0.30;

  var posIndex=flippedCards.length;
  var pos=s.positions[posIndex]||('Pozycja '+(posIndex+1));

  flippedCards.push({index:i,name:name,reversed:isReversed,position:pos});
  card.classList.add('flipped');
  if(isReversed){
    front.className='card-front reversed';
    front.innerHTML='<span class="card-num">&#8595;</span><span class="card-name">'+name+'</span><span class="card-suit">'+pos+'</span><span class="rev-label">odwrócona</span>';
  }else{
    front.className='card-front';
    front.innerHTML='<span class="card-num">&#10022;</span><span class="card-name">'+name+'</span><span class="card-suit">'+pos+'</span>';
  }
  document.getElementById('flipped-count').textContent=flippedCards.length;
  updateSelectedDisplay();

  if(flippedCards.length>=needed){
    document.getElementById('status-msg').textContent='Uk\u0142ad gotowy \u2014 mo\u017cesz interpretowa\u0107!';
    document.getElementById('interpret-btn').disabled=false;
    // Grey out remaining cards
    cardElements.forEach(function(c){
      if(!c.classList.contains('flipped'))c.classList.add('used');
    });
  }
}

function updateSelectedDisplay(){
  var area=document.getElementById('selected-area');
  var container=document.getElementById('selected-cards');
  area.style.display='block';
  container.innerHTML=flippedCards.map(function(c){
    return '<div class="sel-card">'
      +'<span class="pos">'+c.position+':</span>'
      +'<span class="cname'+(c.reversed?' rev':'')+'">'+c.name+(c.reversed?' \u2193':'')+' </span>'
      +(c.reversed?'<span class="rev-tag">(odwr.)</span>':'')
      +'</div>';
  }).join('');
}

async function interpretCards(){
  var s=SPREADS[currentSpread];
  var question=document.getElementById('question').value;
  var userName=document.getElementById('user-name').value;
  var cardsDesc=flippedCards.map(function(c){
    return '- '+c.position+': '+c.name+(c.reversed?' (ODWROCONA)':'');
  }).join('\n');

  savedMeta={spreadName:s.name,question:question,userName:userName,cards:flippedCards.slice()};

  var btn=document.getElementById('interpret-btn');
  btn.disabled=true;

  var resultEl=document.getElementById('result-box');
  resultEl.style.display='block';
  resultEl.className='result-box visible loading';
  resultEl.textContent='Odczytuję energie kart... proszę czekać...';

  var prompt='Dzisiaj mamy rok '+new Date().getFullYear()+'. Jestes doswiadczona tarocistrka i poetka duszy.'
    +(userName?' Zwracasz sie do osoby imieniem '+userName+' - uzyj imienia TYLKO RAZ na poczatku jako ciepłe powitanie ze zdrobnieniem.':' Piszesz w drugiej osobie (Ty, Twoj, Jestes).')
    +' Piszesz piekna plynna polska proza. Bez gwiazdek, hashtagow ani list.\n\n'
    +'Uklad: '+s.name+'\n'
    +(question?'Pytanie / intencja: '+question+'\n':'')
    +'Karty:\n'+cardsDesc+'\n\n'
    +'IMPORTANT: Write approximately 400 words in Polish, no more. '
    +'Napisz zwiezla interpretacje: ogolna energia ukladu (2 zdania), kazda karta w jej pozycji (2 zdania na karte), glowne przeslanie i rada (2 zdania), zdanie-esencja.';

  try{
    var resp=await fetch(WORKER_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:4000,messages:[{role:'user',content:prompt}]})
    });
    var data=await resp.json();
    if(data.error){resultEl.className='result-box visible';resultEl.textContent='Blad API: '+data.error.message;btn.disabled=false;return;}
    resultEl.className='result-box visible';
    savedResult=data.content&&data.content[0]?data.content[0].text:'Przepraszam, wystapil blad.';
    resultEl.textContent=savedResult;
    document.getElementById('pdf-row').style.display='block';
  }catch(e){
    resultEl.className='result-box visible';
    resultEl.textContent='Blad polaczenia: '+e.message;
  }
  btn.disabled=false;
}

function downloadPDF(){
  if(!savedResult)return;
  var m=savedMeta;
  var today=new Date().toLocaleDateString('pl-PL',{day:'2-digit',month:'long',year:'numeric'});
  var cardsRows=m.cards.map(function(c){return '<div class="meta-row">'+c.position+': <strong>'+c.name+(c.reversed?' (odwrocona)':'')+'</strong></div>';}).join('');
  var cleaned=savedResult.replace(/\*\*/g,'').replace(/\*/g,'').replace(/#{1,3} /g,'');

  var html='<!DOCTYPE html><html lang="pl"><head><meta charset="UTF-8">'
    +'<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">'
    +'<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:"EB Garamond",Georgia,serif;color:#2a2018;background:#fff;}'
    +'.page{max-width:720px;margin:0 auto;padding:40px 50px;}'
    +'.header{display:flex;justify-content:space-between;padding-bottom:12px;border-bottom:2px solid #b8902a;margin-bottom:28px;}'
    +'.brand{font-family:"Cinzel",serif;font-size:13px;color:#8a7a62;letter-spacing:0.1em;}'
    +'h1{font-family:"Cinzel",serif;font-size:26px;font-weight:400;text-align:center;margin-bottom:6px;}'
    +'.subtitle{text-align:center;font-style:italic;color:#8a7a62;font-size:15px;margin-bottom:24px;}'
    +'.meta-box{background:#fdf9f2;border:1px solid #e8d5a0;border-radius:4px;padding:14px 18px;margin-bottom:24px;}'
    +'.meta-row{font-size:14px;color:#5a4a32;padding:2px 0;}'
    +'.body-text{font-size:16px;line-height:1.9;color:#2a2018;white-space:pre-wrap;}'
    +'.footer{margin-top:36px;padding-top:12px;border-top:1px solid #e8d5a0;text-align:center;font-size:11px;color:#8a7a62;font-family:"Cinzel",serif;}'
    +'.no-print{position:fixed;bottom:20px;right:20px;display:flex;gap:8px;}'
    +'@media print{.no-print{display:none!important;}@page{margin:15mm;}}</style></head><body>'
    +'<div class="page">'
    +'<div class="header"><span class="brand">Astrum &amp; Arcana</span><span class="brand">'+today+'</span></div>'
    +'<h1>Odczyt Tarota</h1>'
    +'<div class="subtitle">'+m.spreadName+'</div>'
    +'<div class="meta-box">'
    +(m.userName?'<div class="meta-row">Dla: <strong>'+m.userName+'</strong></div>':'')
    +(m.question?'<div class="meta-row">Pytanie: '+m.question+'</div>':'')
    +cardsRows
    +'</div>'
    +'<div class="body-text">'+cleaned+'</div>'
    +'<div class="footer">Astrum &amp; Arcana &nbsp;&middot;&nbsp; '+today+'</div>'
    +'</div>'
    +'<div class="no-print">'
    +'<button onclick="window.print()" style="font-family:Cinzel,serif;font-size:13px;background:#b8902a;color:#fff;border:none;padding:10px 22px;border-radius:4px;cursor:pointer;">Drukuj / Zapisz PDF</button>'
    +'<button onclick="window.close()" style="font-family:Cinzel,serif;font-size:13px;background:transparent;color:#8a7a62;border:1px solid #e8d5a0;padding:10px 16px;border-radius:4px;cursor:pointer;margin-left:8px;">Zamknij</button>'
    +'</div></body></html>';

  var fname='Tarot_'+m.spreadName.replace(/[^a-zA-Z0-9]/g,'_').substring(0,25)+(m.userName?'_'+m.userName:'')+'_'+new Date().toISOString().slice(0,10);
  var w=window.open('','_blank','width=800,height=900');
  w.document.title=fname;
  w.document.write(html);
  w.document.close();
}

// Init
onSpreadChange();
